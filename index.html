<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ElektroAI &#8212; Ak&#305;ll&#305; Elektrik Bak&#305;m Asistan&#305;</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Syne:wght@400;600;800&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #0a0e1a;
  --surface: #111827;
  --surface2: #1a2235;
  --border: #1e2d45;
  --accent: #f59e0b;
  --accent2: #3b82f6;
  --danger: #ef4444;
  --success: #10b981;
  --text: #e2e8f0;
  --text-muted: #64748b;
  --bot-bg: #151f30;
  --user-bg: #1e3a5f;
}

* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: 'Syne', sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  overflow: hidden;
}

/* Animated background grid */
body::before {
  content: '';
  position: fixed;
  inset: 0;
  background-image:
    linear-gradient(rgba(245,158,11,0.03) 1px, transparent 1px),
    linear-gradient(90deg, rgba(245,158,11,0.03) 1px, transparent 1px);
  background-size: 40px 40px;
  pointer-events: none;
  z-index: 0;
}

/* Header */
header {
  position: relative;
  z-index: 10;
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  padding: 14px 20px;
  display: flex;
  align-items: center;
  gap: 14px;
}

.header-icon {
  width: 44px;
  height: 44px;
  background: linear-gradient(135deg, var(--accent), #d97706);
  border-radius: 12px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 22px;
  flex-shrink: 0;
  box-shadow: 0 0 20px rgba(245,158,11,0.3);
}

.header-text h1 {
  font-size: 18px;
  font-weight: 800;
  letter-spacing: -0.5px;
  color: white;
}

.header-text p {
  font-size: 12px;
  color: var(--text-muted);
  font-family: 'Space Mono', monospace;
  margin-top: 2px;
}

.status-dot {
  margin-left: auto;
  display: flex;
  align-items: center;
  gap: 6px;
  font-size: 12px;
  color: var(--success);
  font-family: 'Space Mono', monospace;
}

.status-dot::before {
  content: '';
  width: 7px;
  height: 7px;
  background: var(--success);
  border-radius: 50%;
  animation: pulse 2s infinite;
}

@keyframes pulse {
  0%, 100% { opacity: 1; box-shadow: 0 0 0 0 rgba(16,185,129,0.4); }
  50% { opacity: 0.8; box-shadow: 0 0 0 5px rgba(16,185,129,0); }
}

/* Chat area */
#chat {
  flex: 1;
  overflow-y: auto;
  padding: 20px 16px;
  display: flex;
  flex-direction: column;
  gap: 14px;
  position: relative;
  z-index: 1;
  scroll-behavior: smooth;
}

#chat::-webkit-scrollbar { width: 4px; }
#chat::-webkit-scrollbar-track { background: transparent; }
#chat::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }

/* Messages */
.msg-wrapper {
  display: flex;
  gap: 10px;
  animation: slideIn 0.25s ease;
}

.msg-wrapper.user { flex-direction: row-reverse; }

@keyframes slideIn {
  from { opacity: 0; transform: translateY(10px); }
  to { opacity: 1; transform: translateY(0); }
}

.avatar {
  width: 32px;
  height: 32px;
  border-radius: 10px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 16px;
  flex-shrink: 0;
  margin-top: 2px;
}

.avatar.bot { background: linear-gradient(135deg, var(--accent), #d97706); }
.avatar.user { background: var(--user-bg); border: 1px solid var(--accent2); }

.msg {
  max-width: 78%;
  padding: 12px 16px;
  border-radius: 16px;
  font-size: 14px;
  line-height: 1.65;
  word-wrap: break-word;
  white-space: pre-wrap;
}

.msg.bot {
  background: var(--bot-bg);
  border: 1px solid var(--border);
  border-bottom-left-radius: 4px;
  color: var(--text);
}

.msg.user {
  background: var(--user-bg);
  border: 1px solid rgba(59,130,246,0.3);
  border-bottom-right-radius: 4px;
  color: #bfdbfe;
}

/* AI indicator */
.ai-badge {
  display: inline-flex;
  align-items: center;
  gap: 4px;
  font-size: 10px;
  font-family: 'Space Mono', monospace;
  color: var(--accent);
  background: rgba(245,158,11,0.1);
  border: 1px solid rgba(245,158,11,0.2);
  border-radius: 4px;
  padding: 2px 6px;
  margin-bottom: 6px;
}

/* Buttons area */
#buttons {
  padding: 10px 16px;
  display: flex;
  flex-wrap: wrap;
  gap: 8px;
  background: var(--surface);
  border-top: 1px solid var(--border);
  position: relative;
  z-index: 10;
}

.btn {
  padding: 10px 18px;
  font-size: 13px;
  font-weight: 600;
  font-family: 'Syne', sans-serif;
  border: 1px solid var(--accent);
  border-radius: 8px;
  background: rgba(245,158,11,0.08);
  color: var(--accent);
  cursor: pointer;
  flex: 1;
  min-width: 110px;
  text-align: center;
  transition: all 0.15s;
  letter-spacing: 0.3px;
}

.btn:hover {
  background: rgba(245,158,11,0.18);
  box-shadow: 0 0 12px rgba(245,158,11,0.2);
  transform: translateY(-1px);
}

.btn:active {
  background: var(--accent);
  color: #000;
  transform: translateY(0);
}

/* Input area */
#input-area {
  display: flex;
  padding: 12px 16px;
  gap: 10px;
  background: var(--surface);
  border-top: 1px solid var(--border);
  position: relative;
  z-index: 10;
}

#text-input {
  flex: 1;
  padding: 12px 16px;
  border: 1px solid var(--border);
  border-radius: 10px;
  font-size: 14px;
  font-family: 'Syne', sans-serif;
  background: var(--bg);
  color: var(--text);
  outline: none;
  transition: border-color 0.2s;
}

#text-input:focus {
  border-color: var(--accent);
  box-shadow: 0 0 0 3px rgba(245,158,11,0.1);
}

#text-input::placeholder { color: var(--text-muted); }

#send-btn {
  padding: 12px 20px;
  background: var(--accent);
  color: #000;
  border: none;
  border-radius: 10px;
  font-size: 14px;
  font-weight: 700;
  font-family: 'Syne', sans-serif;
  cursor: pointer;
  transition: all 0.15s;
  white-space: nowrap;
}

#send-btn:hover { background: #fbbf24; box-shadow: 0 0 16px rgba(245,158,11,0.4); }
#send-btn:disabled { background: var(--border); color: var(--text-muted); cursor: not-allowed; box-shadow: none; }

/* Reset button */
#reset-btn {
  width: 100%;
  padding: 9px;
  background: transparent;
  border: none;
  border-top: 1px solid var(--border);
  font-size: 12px;
  font-family: 'Space Mono', monospace;
  cursor: pointer;
  color: var(--text-muted);
  transition: color 0.2s;
  position: relative;
  z-index: 10;
  letter-spacing: 0.5px;
}

#reset-btn:hover { color: var(--danger); }

/* Typing indicator */
.typing {
  display: flex;
  gap: 5px;
  padding: 14px 16px;
  align-items: center;
}

.typing span {
  width: 7px;
  height: 7px;
  background: var(--accent);
  border-radius: 50%;
  animation: bounce 1.2s infinite;
  opacity: 0.6;
}

.typing span:nth-child(2) { animation-delay: 0.2s; }
.typing span:nth-child(3) { animation-delay: 0.4s; }

@keyframes bounce {
  0%, 80%, 100% { transform: translateY(0); opacity: 0.4; }
  40% { transform: translateY(-6px); opacity: 1; }
}

/* Mode indicator */
#mode-bar {
  padding: 6px 16px;
  background: var(--surface2);
  border-top: 1px solid var(--border);
  font-size: 11px;
  font-family: 'Space Mono', monospace;
  color: var(--text-muted);
  display: flex;
  align-items: center;
  gap: 6px;
  position: relative;
  z-index: 10;
}

#mode-bar .mode-label {
  color: var(--accent2);
}
</style>
</head>
<body>

<header>
  <div class="header-icon">&#9889;</div>
  <div class="header-text">
    <h1>ElektroAI</h1>
    <p>Ak&#305;ll&#305; Elektrik Bak&#305;m Asistan&#305;</p>
  </div>
  <div class="status-dot">Aktif</div>

<button id="reset-btn" onclick="resetChat()">&#8634; S&#305;f&#305;rla</button>

  'Hay&#305;r': { text: 'Motoru &#231;al&#305;&#351;t&#305;ran kontakt&#246;r &#231;ekiyor mu?', buttons: ['Evet &#231;ekiyor', 'Hay&#305;r &#231;ekmiyor'] },
  'Hay&#305;r &#231;ekmiyor': { text: 'Motoru &#231;al&#305;&#351;t&#305;ran kontakt&#246;r&#252;n bobin u&#231;lar&#305;na (A1 ve A2) enerji geliyor mu kontrol et. Ama burada kontakt&#246;r&#252;n &#231;al&#305;&#351;ma voltaj&#305;n&#305; bilmen gerekiyor. Genelde kontakt&#246;r &#252;zerinde yazar. (220 volt AC, 110 volt AC, 42 volt AC, 24 volt AC ya da DC, 12 volt AC ya da DC) E&#287;er yazm&#305;yorsa mant&#305;kl&#305; olan &#246;l&#231;&#252; aletini AC moduna al&#305;p ilk &#246;l&#231;&#252;m&#252; bu &#351;ekilde yapmak. E&#287;er herhangi bir de&#287;er g&#246;rmezsen o zaman DC moda al&#305;p &#246;l&#231;&#252;m&#252; &#246;yle yap. E&#287;er bobin u&#231;lar&#305;na enerji gelmiyorsa sistemde kontakt&#246;r&#252; enerjileyen devre eleman&#305;n&#305; kontrol et. (Start butonu, sens&#246;r, sivi&#231;, PLC vs.)', buttons: [] },
  'Evet &#231;ekiyor': { text: 'Kontakt&#246;r&#252;n giri&#351; ve &#231;&#305;k&#305;&#351; u&#231;lar&#305;ndaki &#252;&#231; faz voltaj de&#287;erlerini &#246;l&#231;. 370 volt ile 410 volt aras&#305;nda olmal&#305;. E&#287;er kontakt&#246;r&#252;n giri&#351; taraf&#305;ndaki &#252;&#231; faz normal ama &#231;&#305;k&#305;&#351; taraf&#305;nda &#252;&#231; faz voltajlar&#305;nda eksiklik varsa ya da voltaj hi&#231; yoksa kontakt&#246;r ar&#305;zal&#305;d&#305;r. (Bu arada faz eksikli&#287;i varsa motor iki faza kal&#305;p termik att&#305;r&#305;r.) E&#287;er kontakt&#246;r&#252;n giri&#351; taraf&#305;nda voltaj yoksa kontakt&#246;re enerji gelmiyor demektir.', buttons: [] },
  'Var': { text: 'Invert&#246;r ekran&#305;ndaki hata kodunu yaz&#305;n, ar&#305;za analizine yard&#305;mc&#305; olay&#305;m.', buttons: [] },
  'Yok': { text: 'Invert&#246;rde hata kodu yoksa &#351;unlar&#305; kontrol edin:\n\n1. Invert&#246;r&#252;n &#231;&#305;k&#305;&#351; u&#231;lar&#305;nda (U, V, W) voltaj var m&#305;?\n2. Invert&#246;r&#252;n giri&#351; voltaj&#305; normal mi? (380V i&#231;in yakla&#351;&#305;k 375-405V)\n3. Enable/Run sinyali invert&#246;re geliyor mu?\n4. Referans frekans s&#305;f&#305;r m&#305;?', buttons: [] }
};

// =====================
// STATE
// =====================
var state = null;
var useAI = false;
var conversationHistory = [];
var chat = null;
var modeLabel = null;

function initDOM() {
  chat = document.getElementById('chat');
  modeLabel = document.getElementById('mode-label');
}

// =====================
// UI HELPERS
// =====================
function addMsg(text, isUser, isAI) {
  var wrapper = document.createElement('div');
  wrapper.className = 'msg-wrapper ' + (isUser ? 'user' : 'bot');

  var avatar = document.createElement('div');
  avatar.className = 'avatar ' + (isUser ? 'user' : 'bot');
  avatar.textContent = isUser ? '&#128119;' : '&#9889;';

  var msgDiv = document.createElement('div');
  msgDiv.className = 'msg ' + (isUser ? 'user' : 'bot');

  if (isAI && !isUser) {
    var badge = document.createElement('div');
    badge.className = 'ai-badge';
    badge.textContent = '&#10022; AI MOD';
    msgDiv.appendChild(badge);
  }

  var textNode = document.createElement('div');
  textNode.style.whiteSpace = 'pre-wrap';
  textNode.textContent = text;
  msgDiv.appendChild(textNode);

  wrapper.appendChild(avatar);
  wrapper.appendChild(msgDiv);
  chat.appendChild(wrapper);
  chat.scrollTop = chat.scrollHeight;
  return msgDiv;
}

function showTyping() {
  var wrapper = document.createElement('div');
  wrapper.className = 'msg-wrapper bot';
  wrapper.id = 'typing-indicator';

  var avatar = document.createElement('div');
  avatar.className = 'avatar bot';
  avatar.textContent = '&#9889;';

  var typing = document.createElement('div');
  typing.className = 'msg bot typing';
  typing.innerHTML = '<span></span><span></span><span></span>';

  wrapper.appendChild(avatar);
  wrapper.appendChild(typing);
  chat.appendChild(wrapper);
  chat.scrollTop = chat.scrollHeight;
}

function removeTyping() {
  var t = document.getElementById('typing-indicator');
  if (t) t.remove();
}

function showButtons(buttons) {
  var area = document.getElementById('buttons');
  area.innerHTML = '';
  for (var i = 0; i < buttons.length; i++) {
    (function(btn) {
      var el = document.createElement('button');
      el.className = 'btn';
      el.textContent = btn;
      el.onclick = function() { choose(btn); };
      area.appendChild(el);
    })(buttons[i]);
  }
}

function setMode(mode) {
  modeLabel.textContent = mode;
  modeLabel.style.color = mode === 'AI Modu' ? '#f59e0b' : mode === 'Rehberli Mod' ? '#3b82f6' : '#64748b';
}

function setSendDisabled(val) {
  document.getElementById('send-btn').disabled = val;
  document.getElementById('text-input').disabled = val;
}

// =====================
// KARAR A&#286;ACI
// =====================
function choose(choice) {
  addMsg(choice, true, false);
  var node = TREE[choice];
  if (!node) return;
  addMsg(node.text, false, false);
  state = choice;
  setMode('Rehberli Mod');
  if (node.buttons && node.buttons.length > 0) {
    showButtons(node.buttons);
  } else {
    showButtons([]);
    // Karar a&#287;ac&#305; bitti, AI moduna ge&#231;
    setTimeout(function() {
      addMsg('Yukar&#305;daki ad&#305;mlar&#305; uygulad&#305;n&#305;z m&#305;? Ba&#351;ka bir soru veya sorun varsa serbest yazabilirsiniz, AI size yard&#305;mc&#305; olacak.', false, false);
      useAI = true;
      setMode('AI Modu');
    }, 500);
  }
}

// =====================
// AI API
// =====================
async function askAI(userMessage) {
  setSendDisabled(true);
  showTyping();

  conversationHistory.push({ role: 'user', content: userMessage });

  var systemPrompt = `Sen "ElektroAI" ad&#305;nda uzman bir elektrik bak&#305;m asistan&#305;s&#305;n. 30 y&#305;ll&#305;k elektrik bak&#305;m deneyimine sahip bir ustan&#305;n bilgisiyle donat&#305;ld&#305;n.

Uzmanl&#305;k alanlar&#305;n:
- End&#252;striyel elektrik motor ar&#305;zalar&#305; (220V ve 380V)
- Kontakt&#246;r, termik r&#246;le, invert&#246;r, softstarter sistemleri
- Pano ar&#305;zalar&#305;, sigorta ve kablo sorunlar&#305;
- PLC ve otomasyon sistemleri
- &#304;n&#351;aat elektri&#287;i (trifaze, monofaze)
- Mekanik ve elektrik entegre ar&#305;zalar

Yan&#305;t verirken:
- &#214;nce g&#252;venlik uyar&#305;s&#305;n&#305; hat&#305;rlat
- Ad&#305;m ad&#305;m ar&#305;za tespit y&#246;ntemi ver
- Teknik ama anla&#351;&#305;l&#305;r T&#252;rk&#231;e kullan
- &#214;l&#231;&#252;m de&#287;erlerini belirt (voltaj, ak&#305;m, diren&#231;)
- Pratik saha deneyiminden &#246;rnekler ver
- Kesin bilmiyorsan "kontrol et" de, yanl&#305;&#351; y&#246;nlendirme yapma`;

  try {
    const response = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        model: 'claude-sonnet-4-20250514',
        max_tokens: 1000,
        system: systemPrompt,
        messages: conversationHistory
      })
    });

    const data = await response.json();
    removeTyping();

    if (data.content && data.content[0]) {
      var reply = data.content[0].text;
      conversationHistory.push({ role: 'assistant', content: reply });
      addMsg(reply, false, true);
    } else {
      addMsg('Bir hata olu&#351;tu. L&#252;tfen tekrar deneyin.', false, true);
    }
  } catch (err) {
    removeTyping();
    addMsg('Ba&#287;lant&#305; hatas&#305;. &#304;nternet ba&#287;lant&#305;n&#305;z&#305; kontrol edin.', false, false);
  }

  setSendDisabled(false);
  document.getElementById('text-input').focus();
}

// =====================
// TEXT INPUT
// =====================
function sendText() {
  var input = document.getElementById('text-input');
  var text = input.value.trim();
  if (!text) return;
  input.value = '';
  addMsg(text, true, false);
  var lower = text.toLowerCase();

  if (useAI) {
    askAI(text);
    return;
  }

  if (state === null) {
    var matched = TRIGGERS.some(function(t) { return lower.indexOf(t) !== -1; });
    if (matched) {
      var node = TREE['start'];
      addMsg(node.text, false, false);
      state = 'start';
      setMode('Rehberli Mod');
      showButtons(node.buttons);
    } else {
      // Direk AI'a sor
      useAI = true;
      setMode('AI Modu');
      askAI(text);
    }
  } else {
    var node = TREE[state];
    if (node && node.buttons && node.buttons.length > 0) {
      var match = null;
      for (var i = 0; i < node.buttons.length; i++) {
        if (lower.indexOf(node.buttons[i].toLowerCase()) !== -1) { match = node.buttons[i]; break; }
      }
      if (match) {
        choose(match);
      } else {
        // Buton e&#351;le&#351;medi, AI'a y&#246;nlendir
        useAI = true;
        setMode('AI Modu');
        askAI(text);
      }
    } else {
      useAI = true;
      setMode('AI Modu');
      askAI(text);
    }
  }
}

// =====================
// RESET
// =====================
function resetChat() {
  chat.innerHTML = '';
  document.getElementById('buttons').innerHTML = '';
  state = null;
  useAI = false;
  conversationHistory = [];
  setMode('Bekleniyor');
  addMsg('Merhaba! Ben ElektroAI &#8212; elektrik bak&#305;m asistan&#305;n&#305;z&#305;m.\n\nAr&#305;zay&#305; yazarak ba&#351;lay&#305;n veya bir soru sorun.\n&#214;rnek: "Motor &#231;al&#305;&#351;m&#305;yor", "Sigorta at&#305;yor", "Faz eksikli&#287;i var"', false, false);
}

// =====================
// INIT
// =====================
document.addEventListener('DOMContentLoaded', function() {
  initDOM();
  document.getElementById('text-input').addEventListener('keypress', function(e) {
    if (e.key === 'Enter' && !e.shiftKey) sendText();
  });
  resetChat();
});
</script>
