<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ElektroAI \u2014 Ak\u0131ll\u0131 Elektrik Bak\u0131m Asistan\u0131</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Syne:wght@400;600;800&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #0a0e1a;
  --surface: #111827;
  --surface2: #1a2235;
  --border: #1e2d45;
  --accent: #f59e0b;
  --accent2: #3b82f6;
  --danger: #ef4444;
  --success: #10b981;
  --text: #e2e8f0;
  --text-muted: #64748b;
  --bot-bg: #151f30;
  --user-bg: #1e3a5f;
}

* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: 'Syne', sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  overflow: hidden;
}

/* Animated background grid */
body::before {
  content: '';
  position: fixed;
  inset: 0;
  background-image:
    linear-gradient(rgba(245,158,11,0.03) 1px, transparent 1px),
    linear-gradient(90deg, rgba(245,158,11,0.03) 1px, transparent 1px);
  background-size: 40px 40px;
  pointer-events: none;
  z-index: 0;
}

/* Header */
header {
  position: relative;
  z-index: 10;
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  padding: 14px 20px;
  display: flex;
  align-items: center;
  gap: 14px;
}

.header-icon {
  width: 44px;
  height: 44px;
  background: linear-gradient(135deg, var(--accent), #d97706);
  border-radius: 12px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 22px;
  flex-shrink: 0;
  box-shadow: 0 0 20px rgba(245,158,11,0.3);
}

.header-text h1 {
  font-size: 18px;
  font-weight: 800;
  letter-spacing: -0.5px;
  color: white;
}

.header-text p {
  font-size: 12px;
  color: var(--text-muted);
  font-family: 'Space Mono', monospace;
  margin-top: 2px;
}

.status-dot {
  margin-left: auto;
  display: flex;
  align-items: center;
  gap: 6px;
  font-size: 12px;
  color: var(--success);
  font-family: 'Space Mono', monospace;
}

.status-dot::before {
  content: '';
  width: 7px;
  height: 7px;
  background: var(--success);
  border-radius: 50%;
  animation: pulse 2s infinite;
}

@keyframes pulse {
  0%, 100% { opacity: 1; box-shadow: 0 0 0 0 rgba(16,185,129,0.4); }
  50% { opacity: 0.8; box-shadow: 0 0 0 5px rgba(16,185,129,0); }
}

/* Chat area */
#chat {
  flex: 1;
  overflow-y: auto;
  padding: 20px 16px;
  display: flex;
  flex-direction: column;
  gap: 14px;
  position: relative;
  z-index: 1;
  scroll-behavior: smooth;
}

#chat::-webkit-scrollbar { width: 4px; }
#chat::-webkit-scrollbar-track { background: transparent; }
#chat::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }

/* Messages */
.msg-wrapper {
  display: flex;
  gap: 10px;
  animation: slideIn 0.25s ease;
}

.msg-wrapper.user { flex-direction: row-reverse; }

@keyframes slideIn {
  from { opacity: 0; transform: translateY(10px); }
  to { opacity: 1; transform: translateY(0); }
}

.avatar {
  width: 32px;
  height: 32px;
  border-radius: 10px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 16px;
  flex-shrink: 0;
  margin-top: 2px;
}

.avatar.bot { background: linear-gradient(135deg, var(--accent), #d97706); }
.avatar.user { background: var(--user-bg); border: 1px solid var(--accent2); }

.msg {
  max-width: 78%;
  padding: 12px 16px;
  border-radius: 16px;
  font-size: 14px;
  line-height: 1.65;
  word-wrap: break-word;
  white-space: pre-wrap;
}

.msg.bot {
  background: var(--bot-bg);
  border: 1px solid var(--border);
  border-bottom-left-radius: 4px;
  color: var(--text);
}

.msg.user {
  background: var(--user-bg);
  border: 1px solid rgba(59,130,246,0.3);
  border-bottom-right-radius: 4px;
  color: #bfdbfe;
}

/* AI indicator */
.ai-badge {
  display: inline-flex;
  align-items: center;
  gap: 4px;
  font-size: 10px;
  font-family: 'Space Mono', monospace;
  color: var(--accent);
  background: rgba(245,158,11,0.1);
  border: 1px solid rgba(245,158,11,0.2);
  border-radius: 4px;
  padding: 2px 6px;
  margin-bottom: 6px;
}

/* Buttons area */
#buttons {
  padding: 10px 16px;
  display: flex;
  flex-wrap: wrap;
  gap: 8px;
  background: var(--surface);
  border-top: 1px solid var(--border);
  position: relative;
  z-index: 10;
}

.btn {
  padding: 10px 18px;
  font-size: 13px;
  font-weight: 600;
  font-family: 'Syne', sans-serif;
  border: 1px solid var(--accent);
  border-radius: 8px;
  background: rgba(245,158,11,0.08);
  color: var(--accent);
  cursor: pointer;
  flex: 1;
  min-width: 110px;
  text-align: center;
  transition: all 0.15s;
  letter-spacing: 0.3px;
}

.btn:hover {
  background: rgba(245,158,11,0.18);
  box-shadow: 0 0 12px rgba(245,158,11,0.2);
  transform: translateY(-1px);
}

.btn:active {
  background: var(--accent);
  color: #000;
  transform: translateY(0);
}

/* Input area */
#input-area {
  display: flex;
  padding: 12px 16px;
  gap: 10px;
  background: var(--surface);
  border-top: 1px solid var(--border);
  position: relative;
  z-index: 10;
}

#text-input {
  flex: 1;
  padding: 12px 16px;
  border: 1px solid var(--border);
  border-radius: 10px;
  font-size: 14px;
  font-family: 'Syne', sans-serif;
  background: var(--bg);
  color: var(--text);
  outline: none;
  transition: border-color 0.2s;
}

#text-input:focus {
  border-color: var(--accent);
  box-shadow: 0 0 0 3px rgba(245,158,11,0.1);
}

#text-input::placeholder { color: var(--text-muted); }

#send-btn {
  padding: 12px 20px;
  background: var(--accent);
  color: #000;
  border: none;
  border-radius: 10px;
  font-size: 14px;
  font-weight: 700;
  font-family: 'Syne', sans-serif;
  cursor: pointer;
  transition: all 0.15s;
  white-space: nowrap;
}

#send-btn:hover { background: #fbbf24; box-shadow: 0 0 16px rgba(245,158,11,0.4); }
#send-btn:disabled { background: var(--border); color: var(--text-muted); cursor: not-allowed; box-shadow: none; }

/* Reset button */
#reset-btn {
  width: 100%;
  padding: 9px;
  background: transparent;
  border: none;
  border-top: 1px solid var(--border);
  font-size: 12px;
  font-family: 'Space Mono', monospace;
  cursor: pointer;
  color: var(--text-muted);
  transition: color 0.2s;
  position: relative;
  z-index: 10;
  letter-spacing: 0.5px;
}

#reset-btn:hover { color: var(--danger); }

/* Typing indicator */
.typing {
  display: flex;
  gap: 5px;
  padding: 14px 16px;
  align-items: center;
}

.typing span {
  width: 7px;
  height: 7px;
  background: var(--accent);
  border-radius: 50%;
  animation: bounce 1.2s infinite;
  opacity: 0.6;
}

.typing span:nth-child(2) { animation-delay: 0.2s; }
.typing span:nth-child(3) { animation-delay: 0.4s; }

@keyframes bounce {
  0%, 80%, 100% { transform: translateY(0); opacity: 0.4; }
  40% { transform: translateY(-6px); opacity: 1; }
}

/* Mode indicator */
#mode-bar {
  padding: 6px 16px;
  background: var(--surface2);
  border-top: 1px solid var(--border);
  font-size: 11px;
  font-family: 'Space Mono', monospace;
  color: var(--text-muted);
  display: flex;
  align-items: center;
  gap: 6px;
  position: relative;
  z-index: 10;
}

#mode-bar .mode-label {
  color: var(--accent2);
}
</style>
</head>
<body>

<header>
  <div class="header-icon">\u26a1</div>
  <div class="header-text">
    <h1>ElektroAI</h1>
    <p>Ak\u0131ll\u0131 Elektrik Bak\u0131m Asistan\u0131</p>
  </div>
  <div class="status-dot">Aktif</div>
</header>

<div id="chat"></div>
<div id="buttons"></div>
<div id="input-area">
  <input id="text-input" type="text" placeholder="Ar\u0131zay\u0131 yaz\u0131n... (\u00f6r: motor \u00e7al\u0131\u015fm\u0131yor, sigorta at\u0131yor)" />
  <button id="send-btn" onclick="sendText()">G\u00f6nder \u2191</button>
</div>
<div id="mode-bar">
  Mod: <span class="mode-label" id="mode-label">Bekleniyor</span>
</div>
<button id="reset-btn" onclick="resetChat()">\u21ba S\u0131f\u0131rla</button>

<script>

// =====================
var TRIGGERS = ['motor', 'ariza', 'ar\u0131za', 'calismiyor', '\u00e7al\u0131\u015fm\u0131yor', 'cal\u0131smiyor', 'problem', 'sorun', 'start', 'kontaktor', 'kontakt\u00f6r', 'sigorta', 'termik', 'faz', 'voltaj', 'ak\u0131m', 'akim', 'invertor', 'invert\u00f6r', 'pano', 'kablo'];

var TREE = {
  'start': { text: 'Bu motor ka\u00e7 voltta \u00e7al\u0131\u015f\u0131yor?', buttons: ['220 Volt', '380 Volt'] },
  '220 Volt': { text: '220 volt motorlar\u0131 \u00e7al\u0131\u015ft\u0131rman\u0131n birka\u00e7 yolu var. Bunlardan biri ve do\u011fru olan\u0131 380 volt motorlarda oldu\u011fu gibi kontakt\u00f6r-termik yolu ile \u00e7al\u0131\u015ft\u0131rmak. Ama bazen \u00e7ok \u00f6nemsenmedi\u011fi i\u00e7in sadece bir sigortaya ba\u011fl\u0131 olarak ya da fi\u015f-prizle bile \u00e7al\u0131\u015ft\u0131r\u0131ld\u0131\u011f\u0131 g\u00f6r\u00fcl\u00fcyor.\n\n\u00d6ncelikle motora elektrik gelip gelmedi\u011fine bak. Gelmiyorsa sigorta, kontakt\u00f6r, termik, fi\u015f, priz ve kablo bunlar\u0131 kontrol et. Motor klemensinden \u00f6l\u00e7\u00fc aleti ile \u00f6l\u00e7, 210 ile 240 volt aras\u0131 bir de\u011fer \u00f6l\u00e7men laz\u0131m.\n\nMotorda titreme, de\u011fi\u015fik bir ses, kalkmaya \u00e7al\u0131\u015f\u0131yor ama kalkam\u0131yor, zorlan\u0131yor gibi durumlar varsa genellikle kondansat\u00f6r ar\u0131zal\u0131d\u0131r. Kondansat\u00f6r\u00fcn sa\u011flam olup olmad\u0131\u011f\u0131n\u0131 kontrol et, sa\u011flam de\u011filse de\u011fi\u015ftir.\n\nZorlanman\u0131n sebebi kondansat\u00f6r olmayabilir. Motorda, motorun \u00e7al\u0131\u015ft\u0131rd\u0131\u011f\u0131 y\u00fckte veya sistemde mekaniksel bir s\u0131k\u0131\u015fma olabilir. B\u00f6yle bir durum varsa \u00f6nce motoru y\u00fckten ay\u0131r ve bo\u015fta \u00e7al\u0131\u015fmay\u0131 dene. \u00c7al\u0131\u015f\u0131yorsa sorun y\u00fcktedir.\n\nMotor yine \u00e7al\u0131\u015fm\u0131yorsa motor sarg\u0131lar\u0131n\u0131 \u00f6l\u00e7. Motordan \u00e7\u0131kan u\u00e7lar ile g\u00f6vde aras\u0131nda k\u0131sa devre varsa ya da ana sarg\u0131 veya yard\u0131mc\u0131 sarg\u0131 de\u011fer g\u00f6stermiyorsa motor yan\u0131kt\u0131r.', buttons: [] },
  '380 Volt': { text: 'Bu motor neyle \u00e7al\u0131\u015f\u0131yor?', buttons: ['Kontakt\u00f6r', 'Invert\u00f6r', 'Softstarter'] },
  'Kontakt\u00f6r': { text: 'Termik atm\u0131\u015f m\u0131?', buttons: ['Evet', 'Hay\u0131r'] },

  'Evet': { text: '\u00d6ncelikle g\u00fcvenlik kurallar\u0131na uy, dikkatli ol. Panoda motorun ba\u011fl\u0131 oldu\u011fu kontakt\u00f6r ve termik devresini g\u00f6zle kontrol et. Yan\u0131k herhangi bir par\u00e7a veya kablo var m\u0131, yan\u0131k kokusu geliyor mu? E\u011fer b\u00f6yle bir durum varsa gerekli de\u011fi\u015fimleri yap.', buttons: ['Yan\u0131k var', 'Yan\u0131k yok'] },

  'Yan\u0131k yok': { text: 'Termi\u011fi resetle ve start butonuna bas, bak bakal\u0131m termik tekrar at\u0131yor mu?', buttons: ['Atm\u0131yor', 'Bir s\u00fcre sonra at\u0131yor', 'Hemen at\u0131yor'] },
  'Atm\u0131yor': { text: 'O zaman sorun de\u011fi\u015fken y\u00fckle ilgili olabilir. Anl\u0131k bir zorlanma s\u0131ras\u0131nda ak\u0131m art\u0131p termik atm\u0131\u015f olabilir. Start butonuna bas motoru \u00e7al\u0131\u015ft\u0131r ve motor ak\u0131mlar\u0131n\u0131 kontrol et.', buttons: [] },
  'Bir s\u00fcre sonra at\u0131yor': { text: 'Bu durumda motor \u00e7ekmesi gereken ak\u0131mdan daha fazla ak\u0131m \u00e7ekiyor demektir. Ya y\u00fck motora uygun de\u011fildir ya da mekanik bir zorlanma vard\u0131r. Motoru ve \u00e7al\u0131\u015ft\u0131rd\u0131\u011f\u0131 y\u00fck\u00fc mekaniksel olarak kontrol et.', buttons: [] },
  'Hemen at\u0131yor': { text: 'Bu durumda olas\u0131 bir k\u0131sa devre ihtimali var. Bu k\u0131sa devre motor taraf\u0131nda m\u0131 pano taraf\u0131nda m\u0131 onu anlayal\u0131m. \u015eimdi \u015funu yap: Motor kablosunun panoya girip ba\u011fland\u0131\u011f\u0131 noktadan (klemens ya da direkt kontakt\u00f6r veya termi\u011fe ba\u011flanm\u0131\u015f olabilir) kablolar\u0131 s\u0131ralamas\u0131na dikkat ederek s\u00f6k, yani motor kablosunu panodan ay\u0131r. Termi\u011fi tekrar resetle ve start butonuna bas. Tekrar g\u00f6zlemle, termik at\u0131yor mu?', buttons: ['Atm\u0131yor (kablo \u00e7\u0131kar\u0131nca)', 'Bir s\u00fcre sonra at\u0131yor (kablo \u00e7\u0131kar\u0131nca)', 'Hemen at\u0131yor (kablo \u00e7\u0131kar\u0131nca)'] },

  'Bir s\u00fcre sonra at\u0131yor (kablo \u00e7\u0131kar\u0131nca)': { text: 'Kablo veya ba\u011flant\u0131 noktalar\u0131nda ka\u00e7ak ak\u0131m olabilir. Kabloyu ve ba\u011flant\u0131 noktalar\u0131n\u0131 kontrol edin.', buttons: [] },
  'Hemen at\u0131yor (kablo \u00e7\u0131kar\u0131nca)': { text: 'Pano taraf\u0131nda k\u0131sa devre var. Kontakt\u00f6r, termik ve ba\u011flant\u0131 noktalar\u0131n\u0131 kontrol edin.', buttons: [] },
  'Voltaj normal': { text: 'Kablolar\u0131 \u00e7\u0131kard\u0131\u011f\u0131n yere ba\u011flarken s\u0131ralamaya dikkat etti\u011fini varsay\u0131yorum. \u015eimdi motorun yan\u0131na git ve motora bak, anormal bir durum var m\u0131? Yak\u0131ndan kokla, e\u011fer yan\u0131ksa yan\u0131k kokusunu hissedebilirsin. Sonra yapabiliyorsan motor el ile d\u00f6n\u00fcyor mu kontrol et.', buttons: ['Motor elle d\u00f6n\u00fcyor', 'Motor elle d\u00f6nm\u00fcyor'] },

function addMsg(text, isUser, isAI) {
  var wrapper = document.createElement('div');
  wrapper.className = 'msg-wrapper ' + (isUser ? 'user' : 'bot');

  var avatar = document.createElement('div');
  avatar.className = 'avatar ' + (isUser ? 'user' : 'bot');
  avatar.textContent = isUser ? '\ud83d\udc77' : '\u26a1';

  var msgDiv = document.createElement('div');
  msgDiv.className = 'msg ' + (isUser ? 'user' : 'bot');

  if (isAI && !isUser) {
    var badge = document.createElement('div');
    badge.className = 'ai-badge';
    badge.textContent = '\u2726 AI MOD';
    msgDiv.appendChild(badge);
  }

  var textNode = document.createElement('div');
  textNode.style.whiteSpace = 'pre-wrap';
  textNode.textContent = text;
  msgDiv.appendChild(textNode);

  wrapper.appendChild(avatar);
  wrapper.appendChild(msgDiv);
  chat.appendChild(wrapper);
  chat.scrollTop = chat.scrollHeight;
  return msgDiv;
}
